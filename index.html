<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تكلّم! للأطفال – Speak English!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #1ec8e0;
    --yellow: #FFD93D;
    --pink: #FF6B9D;
    --green: #6BCB77;
    --orange: #FF9A3C;
    --purple: #A66CFF;
    --bg: #FFF9F0;
    --card: #ffffff;
    --dark: #2d2d44;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Floating stars background */
  .stars-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    font-size: 20px;
    animation: floatStar linear infinite;
    opacity: 0.5;
  }

  @keyframes floatStar {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.5; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
  }

  .container {
    max-width: 440px;
    margin: 0 auto;
    padding: 16px 16px 50px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--sky), #0ea5c9);
    border-radius: 28px;
    padding: 18px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 6px 20px rgba(30,200,224,0.35);
  }

  .app-title {
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    color: white;
    direction: ltr;
    text-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  .app-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    margin-top: 2px;
  }

  .mascot {
    font-size: 50px;
    animation: bounce 2s ease-in-out infinite;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* Stars bar */
  .stars-bar {
    background: white;
    border-radius: 20px;
    padding: 12px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 3px 12px rgba(0,0,0,0.07);
  }

  .stars-count {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: var(--orange);
    direction: ltr;
  }

  .stars-label {
    font-size: 13px;
    color: #888;
  }

  .streak-badge {
    background: linear-gradient(135deg, var(--orange), #e67e22);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
  }

  /* Level selector */
  .level-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .level-btn {
    flex: 1;
    padding: 12px 6px;
    border: 3px solid transparent;
    border-radius: 18px;
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .level-btn.easy { background: #e8faf0; color: var(--green); border-color: #c3f0d0; }
  .level-btn.medium { background: #fff8e6; color: var(--orange); border-color: #ffe4a3; }
  .level-btn.hard { background: #fde8f0; color: var(--pink); border-color: #f9c4d8; }
  .level-btn.active.easy { background: var(--green); color: white; border-color: var(--green); box-shadow: 0 4px 14px rgba(107,203,119,0.4); transform: scale(1.05); }
  .level-btn.active.medium { background: var(--orange); color: white; border-color: var(--orange); box-shadow: 0 4px 14px rgba(255,154,60,0.4); transform: scale(1.05); }
  .level-btn.active.hard { background: var(--pink); color: white; border-color: var(--pink); box-shadow: 0 4px 14px rgba(255,107,157,0.4); transform: scale(1.05); }

  /* Category row */
  .cat-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
    direction: rtl;
  }
  .cat-row::-webkit-scrollbar { display: none; }

  .cat-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 20px;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: 2.5px solid #e8e8e8;
    background: white;
    color: #888;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .cat-btn.active {
    border-color: var(--sky);
    background: var(--sky);
    color: white;
    box-shadow: 0 3px 10px rgba(30,200,224,0.3);
  }

  /* Topic card */
  .topic-card {
    border-radius: 28px;
    padding: 28px 22px 22px;
    margin-bottom: 14px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  }

  .card-color-1 { background: linear-gradient(135deg, #FFF3CD, #FFE082); }
  .card-color-2 { background: linear-gradient(135deg, #D4EFFF, #ADE1FF); }
  .card-color-3 { background: linear-gradient(135deg, #FFD6E8, #FFB3D1); }
  .card-color-4 { background: linear-gradient(135deg, #D5F5E3, #A9DFBF); }
  .card-color-5 { background: linear-gradient(135deg, #E8D5FF, #CBA3FF); }

  .topic-emoji {
    font-size: 60px;
    margin-bottom: 12px;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
  }

  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .topic-ar-text {
    font-size: 24px;
    font-weight: 900;
    color: var(--dark);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .topic-en-text {
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    color: rgba(45,45,68,0.7);
    direction: ltr;
  }

  .placeholder-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .placeholder-emoji { font-size: 60px; }
  .placeholder-text { font-size: 16px; color: #999; }

  /* Timer */
  .timer-card {
    background: white;
    border-radius: 24px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    display: flex;
    align-items: center;
    justify-content: space-around;
  }

  .timer-circle {
    position: relative;
    width: 90px;
    height: 90px;
  }

  .timer-circle svg {
    transform: rotate(-90deg);
  }

  .arc-bg-k { fill: none; stroke: #f0f0f0; stroke-width: 7; }
  .arc-fill-k {
    fill: none;
    stroke: var(--sky);
    stroke-width: 7;
    stroke-linecap: round;
    stroke-dasharray: 226;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }
  .arc-fill-k.warn { stroke: var(--pink); }

  .timer-inner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    color: var(--dark);
    direction: ltr;
  }

  .timer-inner.warn { color: var(--pink); animation: timerPulse 0.5s infinite alternate; }
  @keyframes timerPulse { from { transform: scale(1); } to { transform: scale(1.1); } }

  .timer-controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .time-opt {
    padding: 8px 16px;
    border-radius: 14px;
    border: 2.5px solid #e8e8e8;
    background: white;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #aaa;
    cursor: pointer;
    transition: all 0.2s;
    direction: ltr;
    text-align: center;
  }

  .time-opt.active {
    border-color: var(--sky);
    background: linear-gradient(135deg, var(--sky), #0ea5c9);
    color: white;
  }

  /* Main buttons */
  .btn-new {
    width: 100%;
    padding: 18px;
    border-radius: 22px;
    border: none;
    background: linear-gradient(135deg, var(--yellow), #f5a623);
    color: var(--dark);
    font-family: 'Tajawal', sans-serif;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    margin-bottom: 12px;
    box-shadow: 0 6px 20px rgba(255,217,61,0.45);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-new:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,217,61,0.5); }
  .btn-new:active { transform: scale(0.97); }

  .btn-row-k {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .btn-start-k {
    flex: 2;
    padding: 16px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(135deg, var(--green), #3daa4a);
    color: white;
    font-family: 'Tajawal', sans-serif;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 5px 18px rgba(107,203,119,0.4);
    transition: all 0.2s;
  }

  .btn-start-k:hover { transform: translateY(-2px); }
  .btn-start-k.running {
    background: linear-gradient(135deg, var(--pink), #e0507a);
    box-shadow: 0 5px 18px rgba(255,107,157,0.4);
  }

  .btn-reset-k {
    flex: 1;
    padding: 16px;
    border-radius: 20px;
    border: none;
    background: #f0f0f0;
    color: #888;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-reset-k:hover { background: #e5e5e5; }

  /* Celebration */
  .celebration {
    display: none;
    text-align: center;
    background: linear-gradient(135deg, #FFF9C4, #FFE082);
    border-radius: 22px;
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: 0 4px 16px rgba(255,217,61,0.3);
    animation: celebPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes celebPop {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .celeb-emoji { font-size: 40px; }
  .celeb-text { font-size: 18px; font-weight: 900; color: var(--dark); margin-top: 6px; }
  .celeb-sub { font-size: 13px; color: #888; margin-top: 4px; font-family: 'Fredoka One', cursive; direction: ltr; }

  /* Confetti burst */
  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    display: none;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall 1.5s ease-in forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Word of the day */
  .word-card {
    background: linear-gradient(135deg, var(--purple), #8b5cf6);
    border-radius: 22px;
    padding: 16px 18px;
    color: white;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 5px 18px rgba(166,108,255,0.35);
  }

  .word-icon { font-size: 36px; flex-shrink: 0; }
  .word-en { font-family: 'Fredoka One', cursive; font-size: 20px; direction: ltr; }
  .word-ar { font-size: 14px; opacity: 0.85; margin-top: 2px; }
  .word-label { font-size: 11px; opacity: 0.7; margin-bottom: 2px; direction: ltr; font-family: 'Fredoka One', cursive; }
</style>
</head>
<body>

<!-- Floating stars -->
<div class="stars-bg" id="starsBg"></div>

<!-- Confetti -->
<div class="confetti-wrap" id="confettiWrap"></div>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="app-title">🎤 Takallam!</div>
      <div class="app-subtitle">تكلّم إنجليزي مع الأطفال</div>
    </div>
    <div class="mascot" id="mascot">🦜</div>
  </div>

  <!-- Stars bar -->
  <div class="stars-bar">
    <div>
      <div class="stars-label">نجومي ⭐</div>
      <div class="stars-count" id="starsCount">0 ⭐</div>
    </div>
    <div style="text-align:center">
      <div class="stars-label">جلسات اليوم</div>
      <div class="stars-count" id="sessionsToday">0 🎤</div>
    </div>
    <div class="streak-badge" id="streakBadge">🔥 0 يوم</div>
  </div>

  <!-- Level selector -->
  <div class="level-row">
    <button class="level-btn easy active" onclick="setLevel('easy', this)">🟢 سهل</button>
    <button class="level-btn medium" onclick="setLevel('medium', this)">🟡 متوسط</button>
    <button class="level-btn hard" onclick="setLevel('hard', this)">🔴 صعب</button>
  </div>

  <!-- Category tabs -->
  <div class="cat-row">
    <div class="cat-btn active" onclick="setCat('all', this)">🌟 الكل</div>
    <div class="cat-btn" onclick="setCat('animals', this)">🐾 حيوانات</div>
    <div class="cat-btn" onclick="setCat('family', this)">👨‍👩‍👧 عائلة</div>
    <div class="cat-btn" onclick="setCat('school', this)">🏫 مدرسة</div>
    <div class="cat-btn" onclick="setCat('food', this)">🍕 أكل</div>
    <div class="cat-btn" onclick="setCat('nature', this)">🌿 طبيعة</div>
  </div>

  <!-- Topic card -->
  <div class="topic-card card-color-1" id="topicCard">
    <div class="placeholder-content" id="placeholder">
      <div class="placeholder-emoji">👆</div>
      <div class="placeholder-text">اضغط على "موضوع جديد"!</div>
    </div>
    <div id="topicContent" style="display:none; width:100%">
      <div class="topic-emoji" id="topicEmoji">🐶</div>
      <div class="topic-ar-text" id="topicAr"></div>
      <div class="topic-en-text" id="topicEn"></div>
    </div>
  </div>

  <!-- Timer -->
  <div class="timer-card">
    <div class="timer-circle">
      <svg width="90" height="90" viewBox="0 0 90 90">
        <circle class="arc-bg-k" cx="45" cy="45" r="36"/>
        <circle class="arc-fill-k" id="arcFillK" cx="45" cy="45" r="36"/>
      </svg>
      <div class="timer-inner" id="timerDisplay">0:30</div>
    </div>
    <div class="timer-controls">
      <button class="time-opt active" onclick="setTime(30, this)" data-val="30">⏱ 30 ثانية</button>
      <button class="time-opt" onclick="setTime(60, this)" data-val="60">⏱ دقيقة</button>
      <button class="time-opt" onclick="setTime(90, this)" data-val="90">⏱ دقيقة ونص</button>
    </div>
  </div>

  <!-- Main action buttons -->
  <button class="btn-new" onclick="newTopic()">
    <span>🎲</span> موضوع جديد!
  </button>

  <div class="btn-row-k">
    <button class="btn-start-k" id="startBtn" onclick="toggleTimer()">▶ ابدأ الكلام!</button>
    <button class="btn-reset-k" onclick="resetTimer()">↺ من جديد</button>
  </div>

  <!-- Celebration -->
  <div class="celebration" id="celebration">
    <div class="celeb-emoji">🎉🌟🎊</div>
    <div class="celeb-text">رائع! تكلّمت بالإنجليزي! 🥳</div>
    <div class="celeb-sub">Amazing job! Keep going!</div>
  </div>

  <!-- Word of the day -->
  <div class="word-card">
    <div class="word-icon" id="wotdEmoji">💡</div>
    <div>
      <div class="word-label">Word of the Day</div>
      <div class="word-en" id="wotdEn">Wonderful</div>
      <div class="word-ar" id="wotdAr">رائع — يُستخدم عندما تُعجبك شيء كثيراً</div>
    </div>
  </div>

</div>

// ===================== TOPICS =====================

const wordsOfDay = [
  { en: "Wonderful", ar: "رائع — يُستخدم لوصف شيء جميل جداً", emoji: "✨" },
  { en: "Brave", ar: "شجاع — الشخص الذي لا يخاف", emoji: "🦁" },
  { en: "Delicious", ar: "لذيذ — طعم رائع جداً", emoji: "😋" },
  { en: "Friendly", ar: "ودود — شخص يحب الجميع", emoji: "😊" },
  { en: "Colourful", ar: "ملوّن — فيه ألوان كثيرة وجميلة", emoji: "🎨" },
  { en: "Excited", ar: "متحمس — شعور بالفرحة والانتظار", emoji: "🤩" },
  { en: "Gigantic", ar: "عملاق — كبير جداً جداً", emoji: "🐘" },
  { en: "Shiny", ar: "لامع — يعكس الضوء ويبرق", emoji: "⭐" },
];

const mascots = ["🦜", "🐸", "🦊", "🐼", "🦋", "🐧", "🦁", "🐯"];
const colors = ['card-color-1','card-color-2','card-color-3','card-color-4','card-color-5'];

let currentLevel = 'easy';
let currentCat = 'all';
let selectedTime = 30;
let timeLeft = 30;
let totalTime = 30;
let running = false;
let timerInterval = null;
let stars = 0;
let sessionsToday = 0;
let streak = 0;

// Init word of the day
const todayWord = wordsOfDay[new Date().getDay() % wordsOfDay.length];
document.getElementById('wotdEn').textContent = todayWord.en;
document.getElementById('wotdAr').textContent = todayWord.ar;
document.getElementById('wotdEmoji').textContent = todayWord.emoji;

// Random mascot
document.getElementById('mascot').textContent = mascots[Math.floor(Math.random() * mascots.length)];

// Stars background
function createStars() {
  const container = document.getElementById('starsBg');
  const emojis = ['⭐','🌟','✨','💫'];
  for (let i = 0; i < 12; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    star.style.left = Math.random() * 100 + '%';
    star.style.fontSize = (14 + Math.random() * 16) + 'px';
    star.style.animationDuration = (8 + Math.random() * 12) + 's';
    star.style.animationDelay = (Math.random() * 10) + 's';
    container.appendChild(star);
  }
}
createStars();

function setLevel(level, el) {
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function setCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function setTime(secs, el) {
  selectedTime = secs;
  timeLeft = secs;
  totalTime = secs;
  document.querySelectorAll('.time-opt').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (!running) updateTimerDisplay();
  resetTimer();
}

function getTopicList() {
  const catData = topics[currentCat] || topics['all'];
  const levelData = catData[currentLevel];
  if (levelData && levelData.length) return levelData;
  return topics['all'][currentLevel];
}

function newTopic() {
  resetTimer();
  const list = getTopicList();
  const topic = list[Math.floor(Math.random() * list.length)];

  document.getElementById('placeholder').style.display = 'none';
  const content = document.getElementById('topicContent');
  content.style.display = 'block';

  // Reset animation
  const emoji = document.getElementById('topicEmoji');
  emoji.style.animation = 'none';
  void emoji.offsetWidth;
  emoji.style.animation = '';

  document.getElementById('topicEmoji').textContent = topic.emoji;
  document.getElementById('topicAr').textContent = topic.ar;
  document.getElementById('topicEn').textContent = topic.en;

  const card = document.getElementById('topicCard');
  card.className = 'topic-card ' + colors[(topic.color - 1) % colors.length];

  document.getElementById('celebration').style.display = 'none';

  // Change mascot
  document.getElementById('mascot').textContent = mascots[Math.floor(Math.random() * mascots.length)];
}

function toggleTimer() {
  if (running) pauseTimer();
  else startTimer();
}

function startTimer() {
  if (timeLeft <= 0) {
    timeLeft = selectedTime;
    totalTime = selectedTime;
  }
  running = true;
  const btn = document.getElementById('startBtn');
  btn.textContent = '⏸ إيقاف';
  btn.classList.add('running');
  document.getElementById('celebration').style.display = 'none';

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      running = false;
      btn.textContent = '▶ ابدأ الكلام!';
      btn.classList.remove('running');
      onTimerDone();
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval);
  running = false;
  const btn = document.getElementById('startBtn');
  btn.textContent = '▶ ابدأ الكلام!';
  btn.classList.remove('running');
}

function resetTimer() {
  clearInterval(timerInterval);
  running = false;
  timeLeft = selectedTime;
  totalTime = selectedTime;
  const btn = document.getElementById('startBtn');
  btn.textContent = '▶ ابدأ الكلام!';
  btn.classList.remove('running');
  document.getElementById('celebration').style.display = 'none';
  updateTimerDisplay();
}

function onTimerDone() {
  // Award stars
  const earned = currentLevel === 'easy' ? 1 : currentLevel === 'medium' ? 2 : 3;
  stars += earned;
  sessionsToday++;
  document.getElementById('starsCount').textContent = stars + ' ⭐';
  document.getElementById('sessionsToday').textContent = sessionsToday + ' 🎤';

  // Show celebration
  const cel = document.getElementById('celebration');
  cel.style.display = 'block';

  // Confetti
  launchConfetti();
}

function launchConfetti() {
  const wrap = document.getElementById('confettiWrap');
  wrap.style.display = 'block';
  wrap.innerHTML = '';
  const confettiColors = ['#FFD93D','#FF6B9D','#6BCB77','#1ec8e0','#A66CFF','#FF9A3C'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = '-20px';
    piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.animationDuration = (1 + Math.random() * 1) + 's';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    wrap.appendChild(piece);
  }
  setTimeout(() => { wrap.style.display = 'none'; }, 2500);
}

function updateTimerDisplay() {
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  const display = document.getElementById('timerDisplay');
  display.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;

  const warn = timeLeft <= 10 && timeLeft > 0;
  display.classList.toggle('warn', warn);

  const arc = document.getElementById('arcFillK');
  const circumference = 226;
  arc.style.strokeDashoffset = circumference * (1 - timeLeft / totalTime);
  arc.classList.toggle('warn', warn);
}

updateTimerDisplay();
</script>
